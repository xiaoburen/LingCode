<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景：透明 -->
  <rect width="200" height="200" fill="none"/>
  
  <!-- 灵字 - 简洁现代风格 -->
  <g transform="translate(100, 100)" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上部：火 -->
    <!-- 左点 -->
    <path d="M -25 -55 Q -30 -45 -35 -35" stroke-width="2.5"/>
    <!-- 右点 -->
    <path d="M 25 -55 Q 30 -45 35 -35" stroke-width="2.5"/>
    
    <!-- 撇 -->
    <path d="M 0 -50 L -8 -15" stroke-width="2.5"/>
    
    <!-- 捺 -->
    <path d="M 0 -50 L 12 -15" stroke-width="2.5"/>
    
    <!-- 上部横（连接） -->
    <path d="M -45 -25 L 45 -25" stroke-width="2.5"/>
    
    <!-- 中部横 -->
    <path d="M -50 -5 L 50 -5" stroke-width="2.5"/>
    
    <!-- 竖（贯穿） -->
    <path d="M 0 -25 L 0 55" stroke-width="3"/>
    
    <!-- 下部：工 + 人 -->
    <!-- 左撇 -->
    <path d="M 0 10 L -35 40" stroke-width="2.5"/>
    
    <!-- 右捺 -->
    <path d="M 0 10 L 35 40" stroke-width="2.5"/>
    
    <!-- 底部横 -->
    <path d="M -30 50 L 30 50" stroke-width="2.5"/>
  </g>
  
  <!-- 外框（可选，用于图标） -->
  <rect x="15" y="15" width="170" height="170" rx="20" ry="20" 
        fill="none" 
        stroke="#1a1a1a" 
        stroke-width="2"
        stroke-dasharray="none"/>
</svg>