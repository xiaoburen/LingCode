<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 外框 - 圆角矩形 -->
  <rect x="10" y="10" width="180" height="180" rx="20" ry="20"
        fill="none"
        stroke="#000000"
        stroke-width="2"/>
  
  <!-- 灵字 - 居中 -->
  <g transform="translate(100, 100)">
    <!-- 火字头 -->
    <!-- 左点 -->
    <path d="M -25 -45 Q -30 -35 -35 -25" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 右点 -->
    <path d="M 25 -45 Q 30 -35 35 -25" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 中间撇 -->
    <path d="M 0 -40 L -8 -15" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 中间捺 -->
    <path d="M 0 -40 L 8 -15" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 横 -->
    <path d="M -35 -5 L 35 -5" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 竖 -->
    <path d="M 0 -5 L 0 50" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 撇 -->
    <path d="M 0 15 L -30 40" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 捺 -->
    <path d="M 0 15 L 30 40" 
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>