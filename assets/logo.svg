<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景：透明 -->
  <rect width="200" height="200" fill="none"/>
  
  <!-- 灵字 - 黑色细线边框，白色填充 -->
  <g transform="translate(20, 10) scale(0.85)">
    <!-- 上部：彐 -->
    <!-- 横 -->
    <path d="M 60 45 L 140 45" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 竖折 -->
    <path d="M 60 45 L 60 75 L 90 75" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- 横 -->
    <path d="M 60 60 L 85 60" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 火字旁 - 左点 -->
    <path d="M 95 35 Q 90 45 85 55" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 火字旁 - 右点 -->
    <path d="M 115 35 Q 120 45 125 55" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 火字旁 - 撇 -->
    <path d="M 105 40 L 100 70" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 火字旁 - 捺 -->
    <path d="M 105 40 L 115 70" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 下部：巫 -->
    <!-- 横 -->
    <path d="M 50 95 L 150 95" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 竖 -->
    <path d="M 100 75 L 100 160" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 撇 -->
    <path d="M 100 110 L 60 140" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 捺 -->
    <path d="M 100 110 L 140 140" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 人字 - 左撇 -->
    <path d="M 70 120 L 55 150" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 人字 - 右捺 -->
    <path d="M 130 120 L 145 150" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
    
    <!-- 底部横 -->
    <path d="M 70 155 L 130 155" 
          fill="none" 
          stroke="#000000" 
          stroke-width="2.5"
          stroke-linecap="round"/>
  </g>
</svg>